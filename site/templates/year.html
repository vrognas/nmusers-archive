{% extends "base.html" %}
{% block title %}{{ year }} &mdash; NMusers Archive{% endblock %}

{% block content %}
<nav class="breadcrumb" aria-label="Breadcrumb">
  <ol role="list">
    <li><a href="/">Home</a><span class="sep">/</span></li>
    <li aria-current="page">{{ year }}</li>
  </ol>
</nav>

<h1>{{ year }}</h1>
<p class="page-desc">{{ total_messages }} messages across {{ months | length }} months</p>

<div class="month-grid">
  {% for m in months %}
  <a href="/{{ year }}/{{ m.month_num }}/" class="month-card">
    <span>{{ m.month_name }}</span>
    <span class="count">{{ m.count }}</span>
  </a>
  {% endfor %}
</div>
{% endblock %}
