name: Update archive

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

concurrency:
  group: update-archive
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Scrape new messages
        run: uv run python python/scrape.py

      - name: Parse new messages
        run: uv run python python/parse.py --incremental

      - name: Merge and deduplicate
        run: uv run python python/merge.py

      - name: Commit and push if data changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/messages.parquet data/messages_all.parquet
          if git diff --cached --quiet; then
            echo "No new messages found"
          else
            count=$(uv run python -c "import polars as pl; print(len(pl.read_parquet('data/messages_all.parquet')))" || echo "unknown")
            git commit -m "data: update archive (${count} messages)"
            git push
          fi
