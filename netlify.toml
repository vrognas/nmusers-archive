[build]
  command = "uv run python site/build.py && node site/build-search.mjs"
  publish = "site/output"

[build.environment]
  PYTHON_VERSION = "3.12"
  NODE_VERSION = "20"

[[headers]]
  for = "/search-index.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/search-snippets.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
