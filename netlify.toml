[build]
  command = "curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH=\"$HOME/.local/bin:$PATH\" && uv sync --extra site && uv run python site/build.py && npm install && node site/build-search.mjs"
  publish = "site/output"

[build.environment]
  PYTHON_VERSION = "3.12"
  NODE_VERSION = "20"

[[headers]]
  for = "/search-index.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/search-snippets.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
